name: Debug Databricks Deployment

on:
  push:
    branches:
      - main

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      # STEP 1: Download repo
      - name: Checkout Repository
        uses: actions/checkout@v3

      # STEP 2: VERIFY FILE EXISTS
      - name: List Files
        run: ls -R

      # STEP 3: Install CLI
      - name: Install Databricks CLI
        run: pip install databricks-cli==0.17.7

      # STEP 4: Configure auth
      - name: Configure Databricks
        run: |
          mkdir -p ~/.databricks
          printf "[DEFAULT]\nhost=%s\ntoken=%s\n" \
          "${{ secrets.DATABRICKS_HOST }}" \
          "${{ secrets.DATABRICKS_TOKEN }}" > ~/.databrickscfg

      # STEP 5: Upload file (ONLY after verification)
      - name: Upload Notebook
        run: |
          databricks workspace import demo_book.py /Shared/github-actions/demo_book --language PYTHON --overwrite
