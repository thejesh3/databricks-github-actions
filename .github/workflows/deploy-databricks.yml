name: Deploy Notebook to Databricks

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout code from GitHub
      - name: Checkout Repository
        uses: actions/checkout@v3

      # Step 2: Install OLD Databricks CLI (your current working version)
      - name: Install Databricks CLI
        run: pip install databricks-cli==0.17.7

      # Step 3: Configure Databricks authentication
      - name: Configure Databricks CLI
        run: |
          mkdir -p ~/.databricks
          cat <<EOF > ~/.databrickscfg
[DEFAULT]
host = ${{ secrets.DATABRICKS_HOST }}
token = ${{ secrets.DATABRICKS_TOKEN }}
EOF

      # Step 4: Create folder in Databricks Workspace
      - name: Create Workspace Folder
        run: |
          databricks workspace mkdirs /Shared/github-actions

      # Step 5: Upload Notebook to Databricks
      - name: Upload Notebook
        run: |
          databricks workspace import demo_notebook.py /Shared/github-actions/demo_notebook --language PYTHON --overwrite
